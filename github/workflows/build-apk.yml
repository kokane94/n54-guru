name: Build N54 Guru APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permission for creating releases

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: N54-Guru-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.date.outputs.DATE }}-${{ github.run_number }}
          name: Release v${{ steps.date.outputs.DATE }}-${{ github.run_number }}
          body: |-
            N54 Guru Debug APK build from commit ${{ github.sha }}
            
            **Features:**
            - Advanced N54 Diagnostics
            - Part Finder
            - Data Logging
            - Voice Commentary
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
